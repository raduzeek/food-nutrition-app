<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#c4622d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kalorie" />
    <link rel="apple-touch-icon" href="icon-180.png" />
    <link rel="manifest" href="manifest.json" />
    <title>Kalorie z fotky</title>
    <link rel="stylesheet" href="style.css?v=4" />
  </head>
  <body>
    <main>
      <h1>🍽️ Kalorie z fotky</h1>
      <p class="lead">
        Vyfoť jídlo a získej odhad kalorií a makroživin. Běží celé v prohlížeči.
      </p>

      <details id="settings" class="settings">
        <summary>⚙️ Nastavení</summary>
        <p class="hint">
          Klíč se uloží jen v tomhle prohlížeči (localStorage) a používá se pouze
          pro přímé volání Anthropic API. Vytvoříš ho na
          <a href="https://console.anthropic.com" target="_blank" rel="noopener"
            >console.anthropic.com</a
          >.
        </p>
        <div class="keyrow">
          <input
            type="password"
            id="apiKey"
            placeholder="sk-ant-..."
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
          />
          <button type="button" id="saveKey">Uložit</button>
        </div>
        <div id="keyStatus" class="keystatus"></div>

        <div class="goalrow">
          <label for="goal">🎯 Denní cíl (kcal)</label>
          <input
            type="number"
            id="goal"
            inputmode="numeric"
            min="0"
            step="50"
            placeholder="např. 2000"
          />
        </div>
      </details>

      <form id="form">
        <input
          type="file"
          id="camera"
          accept="image/*"
          capture="environment"
          hidden
        />
        <input type="file" id="gallery" accept="image/*" hidden />

        <div class="pick">
          <button type="button" id="cameraBtn" class="big">📷 Vyfotit jídlo</button>
          <button type="button" id="galleryBtn" class="ghost">
            🖼 Vybrat z galerie
          </button>
        </div>

        <img id="preview" alt="Náhled fotografie" hidden />

        <label class="field">
          <span>Upřesnění (volitelné)</span>
          <textarea
            id="upresneni"
            rows="2"
            placeholder="např. kuřecí prsa 150 g, rýže basmati 200 g, bez dresinku"
          ></textarea>
        </label>

        <button type="submit" id="submit" disabled>Analyzovat</button>
      </form>

      <div id="status" class="status" hidden></div>
      <section id="results" hidden></section>

      <section id="overview" class="overview">
        <div class="overview-head">
          <h2>📊 Přehled</h2>
          <div class="period-tabs">
            <button type="button" class="period-tab active" data-period="7">Týden</button>
            <button type="button" class="period-tab" data-period="30">Měsíc</button>
            <button type="button" class="period-tab" data-period="custom">Vlastní</button>
          </div>
        </div>
        <div id="customRange" class="custom-range" hidden>
          <label>Od<input type="date" id="rangeFrom" /></label>
          <label>Do<input type="date" id="rangeTo" /></label>
        </div>
        <div id="overviewBody"></div>
      </section>

      <section id="diary" class="diary">
        <div class="diary-head">
          <h2>📖 Deník jídel</h2>
          <div class="diary-actions">
            <button type="button" id="exportCsv" class="ghost small">⤓ CSV</button>
            <button type="button" id="exportJson" class="ghost small">⤓ JSON</button>
          </div>
        </div>
        <div id="diaryBody"></div>
      </section>
    </main>

    <script src="app.js?v=4"></script>
  </body>
</html>
